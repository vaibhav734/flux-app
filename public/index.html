<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flux Image Generator</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 720px;
    margin: 40px auto;
    padding: 0 20px;
    background: #0f1115;
    color: #e6e6e6;
  }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  p.sub { color: #999; margin-top: 0; margin-bottom: 24px; }
  textarea, input {
    width: 100%;
    box-sizing: border-box;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1d24;
    color: #e6e6e6;
    font-size: 0.95rem;
    margin-bottom: 12px;
  }
  textarea { min-height: 90px; resize: vertical; }
  button {
    background: #4f8cff;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
  }
  button:disabled { background: #333; cursor: not-allowed; }
  #status { margin-top: 12px; color: #aaa; font-size: 0.9rem; }
  #result { margin-top: 20px; }
  #result img { max-width: 100%; border-radius: 8px; }
  pre {
    background: #1a1d24;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 0.8rem;
    color: #f66;
  }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  label { font-size: 0.85rem; color: #999; }
</style>
</head>
<body>
  <h1>Flux.1 Kontext Image Generator</h1>
  <p class="sub">Powered by NVIDIA API &middot; deployed on Render</p>

  <label for="prompt">Prompt</label>
  <textarea id="prompt" placeholder="Describe the image you want...">Ultra-realistic portrait, cinematic lighting, 85mm lens, 8K, photorealistic</textarea>

  <div class="row">
    <div>
      <label for="steps">Steps</label>
      <input id="steps" type="number" value="30" />
    </div>
    <div>
      <label for="cfg">CFG Scale</label>
      <input id="cfg" type="number" value="3.5" step="0.1" />
    </div>
    <div>
      <label for="seed">Seed</label>
      <input id="seed" type="number" value="0" />
    </div>
  </div>

  <button id="generateBtn">Generate Image</button>
  <div id="status"></div>
  <div id="result"></div>

  <script>
    const btn = document.getElementById("generateBtn");
    const status = document.getElementById("status");
    const result = document.getElementById("result");

    btn.addEventListener("click", async () => {
      const prompt = document.getElementById("prompt").value.trim();
      const steps = parseInt(document.getElementById("steps").value, 10);
      const cfg_scale = parseFloat(document.getElementById("cfg").value);
      const seed = parseInt(document.getElementById("seed").value, 10);

      if (!prompt) {
        status.textContent = "Please enter a prompt.";
        return;
      }

      btn.disabled = true;
      status.textContent = "Generating... this can take 10-30 seconds.";
      result.innerHTML = "";

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, steps, cfg_scale, seed }),
        });

        const data = await res.json();

        if (!res.ok) {
          status.textContent = "Error generating image.";
          result.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
          return;
        }

        status.textContent = "Done.";

        // NVIDIA response typically includes base64 image data.
        // Adjust this depending on the actual response shape returned by the API.
        if (data.image) {
          result.innerHTML = `<img src="data:image/png;base64,${data.image}" />`;
        } else if (data.artifacts && data.artifacts.length > 0) {
          result.innerHTML = `<img src="data:image/png;base64,${data.artifacts[0].base64}" />`;
        } else {
          result.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
      } catch (err) {
        status.textContent = "Request failed.";
        result.innerHTML = `<pre>${err.message}</pre>`;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
