<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Flux Image Generator</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1115;
    color: #e6e6e6;
    padding-top: env(safe-area-inset-top);
  }

  /* ---------- Top bar ---------- */
  #topbar {
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: rgba(15,17,21,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #262a33;
  }
  #menuBtn {
    background: #1a1d24; border: 1px solid #333; color: #e6e6e6;
    border-radius: 10px; width: 42px; height: 42px; font-size: 1.2rem;
    cursor: pointer; flex-shrink: 0;
  }
  #topbar h1 { font-size: 1.05rem; margin: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #topbar .sub { font-size: 0.7rem; color: #888; }

  /* ---------- Drawer (sessions) ---------- */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 40;
  }
  #overlay.open { opacity: 1; pointer-events: auto; }
  #drawer {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
    width: min(300px, 85vw);
    background: #14161c; border-right: 1px solid #262a33;
    padding: calc(16px + env(safe-area-inset-top)) 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
    transform: translateX(-105%);
    transition: transform 0.22s ease;
  }
  #drawer.open { transform: translateX(0); }
  #drawer h2 { font-size: 0.9rem; color: #999; margin: 0 4px; font-weight: 600; }
  #newSessionBtn {
    background: #4f8cff; color: #fff; border: none; border-radius: 10px;
    padding: 13px; font-size: 0.95rem; cursor: pointer; width: 100%;
  }
  #sessionList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .session-item {
    display: flex; align-items: center; gap: 6px;
    padding: 12px; border-radius: 10px; cursor: pointer;
    font-size: 0.9rem; color: #ccc; border: 1px solid transparent;
  }
  .session-item.active { background: #1e2634; border-color: #35507e; color: #fff; }
  .session-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-item .del {
    background: none; border: none; color: #666; cursor: pointer;
    font-size: 1rem; padding: 6px 8px;
  }
  #storageInfo { font-size: 0.72rem; color: #666; margin: 0 4px; }

  /* ---------- Main ---------- */
  #main {
    padding: 16px 14px calc(24px + env(safe-area-inset-bottom));
    max-width: 760px; margin: 0 auto;
  }
  label { font-size: 0.8rem; color: #999; display: block; margin-bottom: 4px; }
  textarea, input, select {
    width: 100%; padding: 13px; border-radius: 10px;
    border: 1px solid #333; background: #1a1d24; color: #e6e6e6;
    font-size: 16px; /* 16px prevents iOS zoom-on-focus */
    margin-bottom: 12px;
    appearance: none;
  }
  textarea { min-height: 90px; resize: vertical; }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 0 10px; }
  #generateBtn {
    background: #4f8cff; color: #fff; border: none;
    padding: 15px; border-radius: 12px; font-size: 1.05rem; font-weight: 600;
    cursor: pointer; width: 100%;
  }
  #generateBtn:disabled { background: #333; }
  #status { margin-top: 10px; color: #aaa; font-size: 0.9rem; min-height: 1.2em; }
  pre {
    background: #1a1d24; padding: 12px; border-radius: 10px;
    overflow-x: auto; font-size: 0.78rem; color: #f66;
    white-space: pre-wrap; word-break: break-all;
  }

  /* ---------- Gallery ---------- */
  #gallery { margin-top: 22px; display: flex; flex-direction: column; gap: 18px; }
  .gen-card {
    background: #14161c; border: 1px solid #262a33; border-radius: 14px;
    padding: 12px;
  }
  .gen-card img { width: 100%; border-radius: 10px; display: block; }
  .gen-meta { font-size: 0.8rem; color: #999; margin: 10px 2px 8px; word-break: break-word; line-height: 1.4; }
  .gen-meta .seed { color: #6c6; }
  .gen-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .gen-actions button {
    background: #1e2634; color: #ccc; border: 1px solid #35507e;
    border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; cursor: pointer;
    flex: 1; min-width: 90px;
  }
  .gen-actions button.danger { border-color: #7e3535; }
  #emptyMsg { color: #666; font-size: 0.9rem; margin-top: 24px; text-align: center; }

  /* ---------- Desktop: persistent sidebar ---------- */
  @media (min-width: 900px) {
    #menuBtn { display: none; }
    #overlay { display: none; }
    #drawer {
      transform: none; transition: none;
      width: 260px;
    }
    #topbar { margin-left: 260px; }
    #main { margin-left: calc(260px + (100vw - 260px - 760px) / 2); }
    .controls { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<div id="overlay"></div>

<div id="drawer">
  <h2>Sessions</h2>
  <button id="newSessionBtn">+ New Session</button>
  <div id="sessionList"></div>
  <div id="storageInfo"></div>
</div>

<div id="topbar">
  <button id="menuBtn" aria-label="Sessions">☰</button>
  <div>
    <h1 id="sessionTitle">Flux Image Generator</h1>
    <div class="sub">FLUX.1-dev · NVIDIA API</div>
  </div>
</div>

<div id="main">
  <label for="prompt">Prompt</label>
  <textarea id="prompt" placeholder="Describe the image you want..."></textarea>

  <div class="controls">
    <div>
      <label for="aspect">Aspect ratio</label>
      <select id="aspect">
        <option value="1:1" selected>1:1</option>
        <option value="16:9">16:9</option>
        <option value="9:16">9:16</option>
        <option value="4:3">4:3</option>
        <option value="3:4">3:4</option>
      </select>
    </div>
    <div>
      <label for="steps">Steps</label>
      <input id="steps" type="number" value="50" />
    </div>
    <div>
      <label for="cfg">CFG Scale</label>
      <input id="cfg" type="number" value="3.5" step="0.1" />
    </div>
    <div>
      <label for="seed">Seed (blank = random)</label>
      <input id="seed" type="number" placeholder="random" />
    </div>
  </div>

  <button id="generateBtn">Generate Image</button>
  <div id="status"></div>
  <div id="errorBox"></div>

  <div id="gallery"></div>
  <div id="emptyMsg" style="display:none">No images in this session yet — generate one above.</div>
</div>

<script>
/* ============================================================
   PWA: register service worker
   ============================================================ */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}

/* ============================================================
   Drawer open/close (mobile)
   ============================================================ */
const drawer = document.getElementById("drawer");
const overlay = document.getElementById("overlay");
const menuBtn = document.getElementById("menuBtn");
const openDrawer = () => { drawer.classList.add("open"); overlay.classList.add("open"); };
const closeDrawer = () => { drawer.classList.remove("open"); overlay.classList.remove("open"); };
menuBtn.onclick = openDrawer;
overlay.onclick = closeDrawer;

/* ============================================================
   IndexedDB storage: sessions + generations survive reloads.
   ============================================================ */
const DB_NAME = "flux-app";
const DB_VERSION = 1;
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains("sessions")) {
        d.createObjectStore("sessions", { keyPath: "id" });
      }
      if (!d.objectStoreNames.contains("generations")) {
        const store = d.createObjectStore("generations", { keyPath: "id" });
        store.createIndex("bySession", "sessionId", { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

const tx = (store, mode = "readonly") => db.transaction(store, mode).objectStore(store);
const dbAdd = (store, val) => new Promise((res, rej) => { const r = tx(store, "readwrite").put(val); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
const dbDelete = (store, key) => new Promise((res, rej) => { const r = tx(store, "readwrite").delete(key); r.onsuccess = () => res(); r.onerror = () => rej(r.error); });
const dbGetAll = (store) => new Promise((res, rej) => { const r = tx(store).getAll(); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
const dbGetBySession = (sessionId) => new Promise((res, rej) => { const r = tx("generations").index("bySession").getAll(sessionId); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });

async function deleteSessionAndImages(sessionId) {
  const gens = await dbGetBySession(sessionId);
  for (const g of gens) await dbDelete("generations", g.id);
  await dbDelete("sessions", sessionId);
}

/* ============================================================
   App state
   ============================================================ */
let currentSessionId = null;
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

const els = {
  sessionList: document.getElementById("sessionList"),
  newSessionBtn: document.getElementById("newSessionBtn"),
  gallery: document.getElementById("gallery"),
  emptyMsg: document.getElementById("emptyMsg"),
  status: document.getElementById("status"),
  errorBox: document.getElementById("errorBox"),
  btn: document.getElementById("generateBtn"),
  prompt: document.getElementById("prompt"),
  storageInfo: document.getElementById("storageInfo"),
  sessionTitle: document.getElementById("sessionTitle"),
};

async function currentSession() {
  const sessions = await dbGetAll("sessions");
  return sessions.find((s) => s.id === currentSessionId);
}

async function createSession(name) {
  const session = { id: uid(), name: name || "New session", createdAt: Date.now() };
  await dbAdd("sessions", session);
  currentSessionId = session.id;
  localStorage.setItem("flux-current-session", currentSessionId);
  await renderSessions();
  await renderGallery();
  els.prompt.value = "";
  closeDrawer();
  return session;
}

async function switchSession(id) {
  currentSessionId = id;
  localStorage.setItem("flux-current-session", id);
  await renderSessions();
  await renderGallery();
  closeDrawer();
}

async function renderSessions() {
  const sessions = (await dbGetAll("sessions")).sort((a, b) => b.createdAt - a.createdAt);
  els.sessionList.innerHTML = "";
  for (const s of sessions) {
    const item = document.createElement("div");
    item.className = "session-item" + (s.id === currentSessionId ? " active" : "");
    item.innerHTML = `<span class="name"></span><button class="del" title="Delete session">✕</button>`;
    item.querySelector(".name").textContent = s.name;
    item.querySelector(".name").onclick = () => switchSession(s.id);
    item.querySelector(".del").onclick = async (e) => {
      e.stopPropagation();
      if (!confirm(`Delete session "${s.name}" and all its images?`)) return;
      await deleteSessionAndImages(s.id);
      if (currentSessionId === s.id) {
        const remaining = await dbGetAll("sessions");
        if (remaining.length > 0) {
          currentSessionId = remaining.sort((a, b) => b.createdAt - a.createdAt)[0].id;
        } else {
          await createSession("Session 1");
          return;
        }
      }
      await renderSessions();
      await renderGallery();
    };
    els.sessionList.appendChild(item);
  }
  const cur = sessions.find((s) => s.id === currentSessionId);
  els.sessionTitle.textContent = cur ? cur.name : "Flux Image Generator";
  updateStorageInfo();
}

async function renderGallery() {
  const gens = (await dbGetBySession(currentSessionId)).sort((a, b) => b.createdAt - a.createdAt);
  els.gallery.innerHTML = "";
  els.emptyMsg.style.display = gens.length === 0 ? "block" : "none";

  for (const g of gens) {
    const card = document.createElement("div");
    card.className = "gen-card";

    const img = document.createElement("img");
    img.src = g.image;
    img.loading = "lazy";
    card.appendChild(img);

    const meta = document.createElement("div");
    meta.className = "gen-meta";
    meta.innerHTML = `<span class="prompt-text"></span><br/>Seed: <span class="seed">${g.seed}</span> · ${g.aspect} · ${new Date(g.createdAt).toLocaleString()}`;
    meta.querySelector(".prompt-text").textContent = g.prompt;
    card.appendChild(meta);

    const actions = document.createElement("div");
    actions.className = "gen-actions";

    const reuseBtn = document.createElement("button");
    reuseBtn.textContent = "Reuse";
    reuseBtn.onclick = () => {
      document.getElementById("prompt").value = g.prompt;
      document.getElementById("seed").value = g.seed;
      document.getElementById("aspect").value = g.aspect;
      window.scrollTo({ top: 0, behavior: "smooth" });
    };
    actions.appendChild(reuseBtn);

    const dlBtn = document.createElement("button");
    dlBtn.textContent = "Download";
    dlBtn.onclick = () => {
      const a = document.createElement("a");
      a.href = g.image;
      a.download = `flux-${g.seed}.png`;
      document.body.appendChild(a);
      a.click();
      a.remove();
    };
    actions.appendChild(dlBtn);

    const delBtn = document.createElement("button");
    delBtn.textContent = "Delete";
    delBtn.className = "danger";
    delBtn.onclick = async () => {
      await dbDelete("generations", g.id);
      await renderGallery();
      updateStorageInfo();
    };
    actions.appendChild(delBtn);

    card.appendChild(actions);
    els.gallery.appendChild(card);
  }
}

async function updateStorageInfo() {
  if (navigator.storage && navigator.storage.estimate) {
    const { usage, quota } = await navigator.storage.estimate();
    const mb = (n) => (n / 1024 / 1024).toFixed(1);
    const pct = quota ? Math.round((usage / quota) * 100) : 0;
    els.storageInfo.textContent = `Storage: ${mb(usage)} MB used (${pct}%)`;
    if (pct > 85) {
      els.storageInfo.textContent += " — nearly full, delete old images";
      els.storageInfo.style.color = "#f90";
    } else {
      els.storageInfo.style.color = "#666";
    }
  }
}

/* ============================================================
   Generation
   ============================================================ */
els.btn.addEventListener("click", async () => {
  const prompt = els.prompt.value.trim();
  const aspect_ratio = document.getElementById("aspect").value;
  const stepsVal = document.getElementById("steps").value.trim();
  const cfgVal = document.getElementById("cfg").value.trim();
  const seedVal = document.getElementById("seed").value.trim();

  if (!prompt) { els.status.textContent = "Please enter a prompt."; return; }

  const body = { prompt, aspect_ratio };
  if (stepsVal !== "") body.steps = parseInt(stepsVal, 10);
  if (cfgVal !== "") body.cfg_scale = parseFloat(cfgVal);
  if (seedVal !== "") body.seed = parseInt(seedVal, 10);

  els.btn.disabled = true;
  els.status.textContent = "Generating... this can take 10-60 seconds.";
  els.errorBox.innerHTML = "";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    if (!res.ok) {
      els.status.textContent = "Error generating image.";
      els.errorBox.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      return;
    }

    let b64 = null;
    if (typeof data.image === "string") b64 = data.image;
    else if (data.artifacts?.length > 0 && data.artifacts[0].base64) b64 = data.artifacts[0].base64;
    else if (data.data?.length > 0 && data.data[0].b64_json) b64 = data.data[0].b64_json;

    if (!b64) {
      els.status.textContent = "Couldn't find image data in response.";
      els.errorBox.innerHTML = `<pre>${JSON.stringify(data, null, 2).slice(0, 3000)}</pre>`;
      return;
    }

    const src = b64.startsWith("data:") ? b64 : `data:image/png;base64,${b64}`;

    // Name the session after the first prompt (like chat titles)
    const cur = await currentSession();
    if (cur && (cur.name.startsWith("Session") || cur.name === "New session")) {
      const gens = await dbGetBySession(currentSessionId);
      if (gens.length === 0) {
        cur.name = prompt.slice(0, 40) + (prompt.length > 40 ? "…" : "");
        await dbAdd("sessions", cur);
      }
    }

    try {
      await dbAdd("generations", {
        id: uid(),
        sessionId: currentSessionId,
        prompt,
        seed: data.seed_used,
        aspect: aspect_ratio,
        image: src,
        createdAt: Date.now(),
      });
      els.status.textContent = "Done.";
    } catch (storageErr) {
      els.status.textContent = "Image generated, but couldn't be saved — storage is full. Delete old images to free space.";
    }

    await renderSessions();
    await renderGallery();
    updateStorageInfo();
  } catch (err) {
    els.status.textContent = "Request failed.";
    els.errorBox.innerHTML = `<pre>${err.message}</pre>`;
  } finally {
    els.btn.disabled = false;
  }
});

els.newSessionBtn.addEventListener("click", () => createSession("New session"));

/* ============================================================
   Init
   ============================================================ */
(async () => {
  db = await openDB();
  const sessions = await dbGetAll("sessions");
  const saved = localStorage.getItem("flux-current-session");
  if (sessions.length === 0) {
    await createSession("Session 1");
  } else {
    currentSessionId =
      sessions.find((s) => s.id === saved)?.id ||
      sessions.sort((a, b) => b.createdAt - a.createdAt)[0].id;
    await renderSessions();
    await renderGallery();
  }
})();
</script>
</body>
</html>
